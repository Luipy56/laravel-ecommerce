# Production / generic PHP+Nginx (e.g. Dockerfile.prod). No Vite upstream — dev Compose mounts default.dev.conf instead.

server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /var/www/html/public;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    index index.php;

    charset utf-8;

    client_max_body_size 64M;

    # Exact-match React SPA routes that conflict with real public/ directories.
    # Without this, nginx does a 301 to /games/ (stripping the Docker port).
    location = /games {
        try_files /index.php?$query_string =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; try_files $uri /index.php?$query_string; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
