<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>2048</title>

  <link href="style/main.css" rel="stylesheet" type="text/css">
  <link rel="shortcut icon" href="favicon.ico">
  <meta name="HandheldFriendly" content="True">
  <meta name="MobileOptimized" content="320">
  <meta name="viewport" content="width=device-width, target-densitydpi=160dpi, initial-scale=1.0, maximum-scale=1, user-scalable=no, minimal-ui">
  <style>
    .score-container:before { content: "Puntos"; }
    .best-container:before { content: "Récord"; }
    /* Hide footer content so the game fits the iframe without scrolling */
    .game-explanation, hr, p:last-of-type { display: none; }
    html, body { overflow: hidden; height: 100%; }
    .container { padding-bottom: 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="heading">
      <h1 class="title">2048</h1>
      <div class="scores-container">
        <div class="score-container">0</div>
        <div class="best-container">0</div>
      </div>
    </div>

    <div class="above-game">
      <p class="game-intro">¡Une los números y llega a la <strong>ficha 2048!</strong></p>
      <a class="restart-button">Nuevo juego</a>
    </div>

    <div class="game-container">
      <div class="game-message">
        <p></p>
        <div class="lower">
          <a class="keep-playing-button">Seguir jugando</a>
          <a class="retry-button">Reintentar</a>
        </div>
      </div>

      <div class="grid-container">
        <div class="grid-row">
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
        </div>
        <div class="grid-row">
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
        </div>
        <div class="grid-row">
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
        </div>
        <div class="grid-row">
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
        </div>
      </div>

      <div class="tile-container">
      </div>
    </div>

    <p class="game-explanation">
      <strong class="important">Cómo jugar:</strong> Usa las <strong>teclas de flecha</strong> para mover las fichas. Cuando dos fichas con el mismo número se tocan, <strong>¡se fusionan en una!</strong>
    </p>
    <hr>
    <p>
      Creado por <a href="http://gabrielecirulli.com" target="_blank">Gabriele Cirulli.</a> Licencia MIT.
    </p>
  </div>

  <script src="js/bind_polyfill.js"></script>
  <script src="js/classlist_polyfill.js"></script>
  <script src="js/animframe_polyfill.js"></script>
  <script src="js/keyboard_input_manager.js"></script>
  <script src="js/html_actuator.js"></script>
  <script src="js/grid.js"></script>
  <script src="js/tile.js"></script>
  <script src="js/local_storage_manager.js"></script>
  <script src="js/game_manager.js"></script>
  <script src="js/application.js"></script>
  <script>
    // Translate game-over and win messages
    (function () {
      var original = HTMLActuator.prototype.message;
      HTMLActuator.prototype.message = function (won) {
        var message = won ? "¡Has ganado!" : "¡Juego terminado!";
        this.messageContainer.classList.add(won ? "game-won" : "game-over");
        this.messageContainer.getElementsByTagName("p")[0].textContent = message;
      };
    })();
  </script>
</body>
</html>
