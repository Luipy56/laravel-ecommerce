# Prod CI/CD: runs on every push to branch `prod` (e.g. after merge).
# - Runs tests and frontend build.
# - Deploys to server via SSH when secrets are configured (see DEPLOY.md).

name: Prod CI/CD

on:
  push:
    branches: [prod]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: dom, fileinfo, sqlite
          coverage: none

      - name: Get composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install composer deps
        run: composer install --no-progress --prefer-dist

      - name: Prepare Laravel env
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        run: composer test

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm deps
        run: npm ci

      - name: Build frontend
        run: npm run build

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: ci
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: prod

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.PROD_PATH }}
            git fetch origin prod
            git reset --hard origin/prod
            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
            export NVM_DIR="$HOME/.nvm" && [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            nvm use 22 || true
            npm ci
            npm run build
            php artisan migrate --force --no-interaction
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            sudo chown -R www-data:webgroup storage bootstrap/cache
            sudo chmod -R 775 storage bootstrap/cache
            echo "Deploy done."
