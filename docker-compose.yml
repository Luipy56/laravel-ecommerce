# Local development: Nginx + PHP-FPM + Postgres + Vite + queue worker.
# Prerequisites: copy .env from .env.example, set APP_KEY, then:
#   docker compose run --rm app composer install
#   docker compose run --rm node npm ci   # or let the node service install on first start
#   docker compose up -d
# App: http://localhost:8080  Vite: http://localhost:5173

name: laravel-ecommerce

x-app-build: &app-build
  context: .
  dockerfile: docker/php/Dockerfile
  target: development

x-app-volumes: &app-volumes
  - .:/var/www/html
  - vendor_data:/var/www/html/vendor

x-app-environment: &app-environment
  APP_ENV: local
  APP_DEBUG: "true"
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_DATABASE: ${DB_DATABASE:-laravel}
  DB_USERNAME: ${DB_USERNAME:-postgres}
  DB_PASSWORD: ${DB_PASSWORD:-postgres}
  DB_SSLMODE: disable
  WAIT_FOR_DB: "1"
  TRUSTED_PROXIES: "*"
  APP_URL: ${APP_URL:-http://localhost:8080}
  VITE_DEV_SERVER_URL: ${VITE_DEV_SERVER_URL:-http://localhost:5173}
  SESSION_DRIVER: ${SESSION_DRIVER:-database}
  CACHE_STORE: ${CACHE_STORE:-database}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-laravel}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-laravel}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: *app-build
    volumes: *app-volumes
    environment: *app-environment
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  node:
    image: node:22-bookworm-slim
    working_dir: /var/www/html
    command: sh -c "if [ ! -d node_modules ]; then npm ci; fi && npm run dev:hmr -- --host 0.0.0.0 --port 5173"
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - .:/var/www/html
      - node_modules_data:/var/www/html/node_modules
    environment:
      DOCKER: "1"
      VITE_DOCKER_HMR_HOST: ${VITE_DOCKER_HMR_HOST:-localhost}
      CHOKIDAR_USEPOLLING: "true"

  queue:
    build: *app-build
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes: *app-volumes
    environment: *app-environment
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_started

volumes:
  postgres_data:
  vendor_data:
  node_modules_data:
